<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Vault — Shared Item</title>
<link href="fonts.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0c;--surface:#111114;--card:#16161a;
  --border:#222228;--text:#f0f0f4;--sub:#888896;--dim:#444452;
  --accent:#7c6af7;--accent-dim:#2a2440;--accent-glow:#7c6af720;
  --danger:#f05;--danger-dim:#300010;--green:#00c896;--warn:#f0a000;
  --radius:10px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
[data-theme="light"]{
  --bg:#f5f5f7;--surface:#ffffff;--card:#ffffff;
  --border:#e0e0e8;--text:#111118;--sub:#666674;--dim:#aaaabc;
  --accent:#7c6af7;--accent-dim:#ebe8ff;--accent-glow:#7c6af718;
  --danger:#e0003a;--danger-dim:#fff0f4;--green:#009970;--warn:#c07800;
}
body{
  font-family:var(--sans);background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.container{width:100%;max-width:440px}
.logo{
  display:flex;align-items:center;gap:10px;
  justify-content:center;margin-bottom:28px;
}
.logo-mark{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.logo-img{width:36px;height:36px;display:block;object-fit:contain}
.logo-img-light{display:none}
[data-theme="light"] .logo-img-dark{display:none}
[data-theme="light"] .logo-img-light{display:block}
.logo-name{font-size:18px;font-weight:600;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--dim);font-family:var(--mono)}
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:24px;
}
.card-title{
  font-size:15px;font-weight:600;margin-bottom:4px;
  display:flex;align-items:center;gap:8px;
}
.card-sub{font-size:12px;color:var(--sub);margin-bottom:20px;line-height:1.5}
.field-label{
  font-size:10px;font-family:var(--mono);color:var(--dim);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;
}
.pw-input-wrap{position:relative;margin-bottom:10px}
.pw-input{
  width:100%;padding:11px 44px 11px 13px;
  border-radius:var(--radius);border:1px solid var(--border);
  background:var(--surface);color:var(--text);
  font-size:13px;font-family:var(--mono);outline:none;letter-spacing:1px;
}
.pw-input:focus{border-color:var(--accent)}
.eye-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--dim);
  padding:4px;display:flex;align-items:center;transition:color .15s;
}
.eye-btn:hover{color:var(--text)}
.btn-primary{
  width:100%;padding:12px;border:none;border-radius:var(--radius);
  background:linear-gradient(135deg,#7c6af7,#a78bfa);
  color:#fff;font-size:14px;font-weight:500;font-family:var(--sans);
  cursor:pointer;transition:opacity .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.msg{font-size:12px;min-height:16px;margin-bottom:8px;font-family:var(--mono)}
.msg.err{color:var(--danger)}
.msg.ok{color:var(--green)}

/* Result card */
.result{display:none}
.result.show{display:block}
.field-row{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;margin-bottom:8px;
}
.field-row-label{
  font-size:10px;font-family:var(--mono);color:var(--dim);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;
}
.field-row-value{
  font-size:14px;font-family:var(--mono);color:var(--text);
  word-break:break-all;display:flex;align-items:center;gap:8px;
}
.field-row-value.masked{letter-spacing:3px;color:var(--dim)}
.copy-btn{
  background:none;border:none;cursor:pointer;
  color:var(--dim);padding:4px;flex-shrink:0;
  display:flex;align-items:center;transition:color .15s;
  margin-left:auto;
}
.copy-btn:hover{color:var(--accent)}
.reveal-btn{
  background:none;border:none;cursor:pointer;
  color:var(--dim);padding:4px;flex-shrink:0;
  display:flex;align-items:center;transition:color .15s;
}
.reveal-btn:hover{color:var(--text)}
.expiry-bar{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:var(--sub);font-family:var(--mono);
  margin-top:16px;padding-top:14px;border-top:1px solid var(--border);
}
.expiry-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--green);flex-shrink:0;
}
.expiry-dot.warn{background:var(--warn)}
.footer{
  text-align:center;margin-top:20px;
  font-size:11px;color:var(--dim);line-height:1.6;
}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}
.state-error{
  text-align:center;padding:20px 0;
}
.state-error-icon{
  width:48px;height:48px;border-radius:14px;
  background:var(--danger-dim);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;
}
.state-error-title{font-size:15px;font-weight:600;margin-bottom:6px}
.state-error-desc{font-size:13px;color:var(--sub);line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-mark">
      <img src="logo-dark.webp" class="logo-img logo-img-dark" alt="" width="36" height="36">
      <img src="logo-light.webp" class="logo-img logo-img-light" alt="" width="36" height="36">
    </div>
    <div>
      <div class="logo-name">Hesych</div>
      <div class="logo-sub">Encrypted Share</div>
    </div>
  </div>

  <div class="card" id="mainCard">
    <!-- State: loading -->
    <div id="stateLoading" style="text-align:center;padding:20px 0;color:var(--sub);font-size:13px">
      Loading…
    </div>

    <!-- State: error (expired / invalid) -->
    <div id="stateError" style="display:none">
      <div class="state-error">
        <div class="state-error-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div class="state-error-title" id="errorTitle">Link Expired</div>
        <div class="state-error-desc" id="errorDesc">This shared link has expired or is invalid.</div>
      </div>
    </div>

    <!-- State: unlock form -->
    <div id="stateUnlock" style="display:none">
      <div class="card-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span id="sharedItemTitle">Shared Item</span>
      </div>
      <div class="card-sub">Enter the passphrase to view this shared password. Ask the sender if you don't have it.</div>
      <div class="field-label">Passphrase</div>
      <div class="pw-input-wrap">
        <input type="password" class="pw-input" id="passphraseInput"
          placeholder="Enter passphrase…"
          onkeydown="if(event.key==='Enter')doUnlock()"/>
        <button class="eye-btn" onclick="toggleEye()" type="button">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="msg" id="unlockMsg"></div>
      <button class="btn-primary" id="unlockBtn" onclick="doUnlock()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
        View Password
      </button>
    </div>

    <!-- State: result -->
    <div id="stateResult" style="display:none">
      <div class="card-title" style="margin-bottom:16px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
        <span id="resultTitle">Shared Item</span>
      </div>
      <div id="resultFields"></div>
      <div class="expiry-bar" id="expiryBar">
        <span class="expiry-dot" id="expiryDot"></span>
        <span id="expiryText"></span>
      </div>
    </div>
  </div>

  <div class="footer">
    Encrypted with AES-256-GCM · <a href="./app.html">Get Vault</a> — your own password manager
  </div>
</div>

<script>
let _bundle = null;
let _revealed = new Set();

// Parse bundle from URL hash
function parseBundle(){
  try{
    const hash = window.location.hash.slice(1);
    if(!hash) return null;
    return JSON.parse(atob(hash));
  }catch(e){ return null; }
}

function showState(id){
  ['stateLoading','stateError','stateUnlock','stateResult']
    .forEach(s=>document.getElementById(s).style.display = s===id?'block':'none');
}

function toggleEye(){
  const input = document.getElementById('passphraseInput');
  const icon = document.getElementById('eyeIcon');
  if(input.type==='password'){
    input.type='text';
    icon.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type='password';
    icon.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

async function deriveKey(passphrase, saltB64){
  const saltBytes = Uint8Array.from(atob(saltB64), c=>c.charCodeAt(0));
  const keyMaterial = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(passphrase),
    {name:'PBKDF2'}, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:saltBytes, iterations:600000, hash:'SHA-256'},
    keyMaterial,
    {name:'AES-GCM', length:256},
    false, ['encrypt','decrypt']
  );
}

async function doUnlock(){
  const passphrase = document.getElementById('passphraseInput').value;
  const msg = document.getElementById('unlockMsg');
  const btn = document.getElementById('unlockBtn');

  if(!passphrase){ msg.textContent='Enter passphrase'; msg.className='msg err'; return; }

  btn.disabled=true;
  btn.innerHTML='<span style="opacity:.6">Decrypting…</span>';
  msg.textContent='';

  try{
    const key = await deriveKey(passphrase, _bundle.s);
    const iv = Uint8Array.from(atob(_bundle.iv), c=>c.charCodeAt(0));
    const data = Uint8Array.from(atob(_bundle.d), c=>c.charCodeAt(0));
    const dec = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, data);
    const payload = JSON.parse(new TextDecoder().decode(dec));

    // Check expiry
    if(payload.exp && Date.now() > payload.exp){
      showState('stateError');
      document.getElementById('errorTitle').textContent = 'Link Expired';
      document.getElementById('errorDesc').textContent = 'This shared link has expired. Ask the sender to generate a new one.';
      return;
    }

    renderResult(payload);
  }catch(e){
    msg.textContent = 'Wrong passphrase. Try again.';
    msg.className = 'msg err';
    btn.disabled=false;
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg> View Password`;
  }
}

// C3 FIX: renderResult now builds DOM with createElement + textContent/addEventListener.
// No user-controlled data is ever interpolated into HTML strings or inline onclick attributes.
const _fieldValues = {}; // store values by field id for safe access

function renderResult(payload){
  document.getElementById('resultTitle').textContent = payload.title || 'Shared Item';

  const fields = [];
  if(payload.username) fields.push({label:'USERNAME', value:payload.username, type:'text', id:'username'});
  if(payload.password) fields.push({label:'PASSWORD', value:payload.password, type:'password', id:'password'});
  if(payload.notes) fields.push({label:'NOTES', value:payload.notes, type:'text', id:'notes'});
  if(payload.totp) fields.push({label:'2FA SECRET', value:payload.totp, type:'password', id:'totp'});

  const container = document.getElementById('resultFields');
  container.innerHTML = '';

  fields.forEach(f => {
    // Store value safely — never in DOM attributes
    _fieldValues[f.id] = f.value;

    const row = document.createElement('div');
    row.className = 'field-row';

    const labelEl = document.createElement('div');
    labelEl.className = 'field-row-label';
    labelEl.textContent = f.label; // safe: label is hardcoded above, not user data

    const valueEl = document.createElement('div');
    valueEl.className = 'field-row-value' + (f.type === 'password' ? ' masked' : '');
    valueEl.id = 'val-' + f.id;

    // Text node for the value display
    const textNode = document.createTextNode(f.type === 'password' ? '••••••••' : f.value);
    valueEl.appendChild(textNode);

    // Reveal button (password fields only)
    if(f.type === 'password'){
      const revealBtn = document.createElement('button');
      revealBtn.className = 'reveal-btn';
      revealBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      revealBtn.addEventListener('click', () => toggleReveal(f.id));
      valueEl.appendChild(revealBtn);
    }

    // Copy button
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    copyBtn.addEventListener('click', () => copyField(f.id, copyBtn));
    valueEl.appendChild(copyBtn);

    row.appendChild(labelEl);
    row.appendChild(valueEl);
    container.appendChild(row);
  });

  // Expiry countdown
  if(payload.exp){
    const rem = payload.exp - Date.now();
    const dot = document.getElementById('expiryDot');
    const txt = document.getElementById('expiryText');
    const hrs = Math.floor(rem/3600000);
    const mins = Math.floor((rem%3600000)/60000);
    if(rem < 3600000){ dot.className='expiry-dot warn'; }
    txt.textContent = hrs > 0
      ? `Expires in ${hrs}h ${mins}m`
      : `Expires in ${mins} minutes`;
  }

  // C3 FIX: strip URL fragment from address bar after successful decrypt
  // Prevents encrypted bundle from staying in browser history
  history.replaceState(null, '', location.pathname);

  showState('stateResult');
}

function toggleReveal(id){
  const el = document.getElementById('val-'+id);
  if(!el) return;
  const value = _fieldValues[id] || '';
  if(_revealed.has(id)){
    _revealed.delete(id);
    el.classList.add('masked');
    el.firstChild.textContent = '••••••••';
  } else {
    _revealed.add(id);
    el.classList.remove('masked');
    el.firstChild.textContent = value;
  }
}

async function copyField(id, btn){
  const value = _fieldValues[id] || '';
  try{
    await navigator.clipboard.writeText(value);
    const orig = btn.innerHTML;
    btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    setTimeout(()=>btn.innerHTML=orig, 1500);
  }catch(e){}
}

function escHtml(str){
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
window.addEventListener('DOMContentLoaded', ()=>{
  // Apply theme: localStorage (returning user) → system preference → dark default
  const theme = localStorage.getItem('hesych_theme')
    || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  if(theme !== 'dark') document.documentElement.setAttribute('data-theme', theme);

  _bundle = parseBundle();
  if(!_bundle || _bundle.v !== 1){
    showState('stateError');
    document.getElementById('errorTitle').textContent = 'Invalid Link';
    document.getElementById('errorDesc').textContent = 'This link is invalid or has been corrupted.';
    return;
  }
  showState('stateUnlock');
});
</script>
</body>
</html>
